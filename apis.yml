aid: enrich-so
url: https://raw.githubusercontent.com/api-evangelist/enrich-so/refs/heads/main/apis.yml
name: Enrich
kind: company
description: >-
  Enrich (enrich.so) is a person and company data enrichment API for B2B go-to-market,
  sales, and web intelligence teams. From a single REST interface it resolves a
  professional profile from an email address (reverse email lookup), finds and verifies
  professional email addresses, finds mobile and phone numbers, resolves a company and
  geolocation from an IP address, scrapes LinkedIn company followers, and searches a
  lead-finder database of people and organizations for contact discovery and lead
  enrichment. All endpoints share one base URL and are metered with a prepaid credit
  balance; unsuccessful ("not found") lookups are refunded.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Data Enrichment
- Contact Discovery
- Web Intelligence
- B2B Data
- Lead Enrichment
- Email Finder
