actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists on Enrich's own API. The public API is
    request/response REST; asynchronous work uses HTTP submit/poll/results plus
    optional outbound webhook callbacks. No AsyncAPI document was created because
    there is no server-push transport (WebSocket or SSE) on Enrich's own API to
    model.
