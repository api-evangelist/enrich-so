aid: enrich-so
name: Enrich
review:
  question: Does Enrich expose a documented public WebSocket API?
  answer: false
  date: '2026-07-11'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Enrich's public API is request/response
    REST over HTTPS under https://dev.enrich.so/api/v3. Its long-running work
    (batch email validation/finding, bulk phone/profile lookup, company-follower
    scraping, lead reveal/enrich, CSV export) uses an asynchronous submit -> poll
    -> get-results pattern, plus optional outbound webhook callbacks that Enrich
    POSTs to a customer-supplied URL. Both are ordinary HTTP; neither is a
    server-push transport (WebSocket or SSE) on Enrich's own API, so there is no
    AsyncAPI surface to model.
findings:
  summary: |
    Enrich (enrich.so) does not publish a documented public WebSocket API.
    Enrich is a person and company data enrichment provider. Its public API is a
    single REST (HTTPS) interface with base URL https://dev.enrich.so/api/v3,
    authenticated with an API key (sk_ prefixed) sent in the x-api-key header or
    as an Authorization Bearer token. Every documented endpoint is
    request/response REST. Batch and bulk jobs (email validation, email finder,
    phone finder, professional-profile lookup, company-follower scrape, lead
    reveal/enrich, CSV export, count estimation) follow an asynchronous
    submit/check-progress/get-results HTTP pattern and can additionally deliver
    optional webhook callbacks (Enrich POSTs per-result and completion events to a
    customer webhookUrl). No realtime, bidirectional, or streaming WebSocket
    (ws:// or wss://) endpoint is documented anywhere in Enrich's API reference as
    of the review date.
  accessModel: |
    Commercial, closed-source SaaS. There is no self-hostable component. Access
    requires an Enrich account and API key from the dashboard
    (https://dash.enrich.so/dashboard/api-keys). New accounts receive a one-time
    grant of free credits; ongoing use is metered against a prepaid credit balance
    with per-endpoint credit costs, and "not found" results are refunded. Official
    SDKs exist for Node.js/TypeScript (@enrich.so/sdk) and Go
    (github.com/maximiseai/enrich-go-sdk). The interactive reference is hosted on
    Apidog at doc.enrich.so.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://dev.enrich.so/api/v3
      documented: true
      note: All documented endpoints are request/response REST over HTTPS.
    - protocol: Webhook
      scheme: https
      documented: true
      note: >-
        Optional outbound callbacks. For batch/scrape jobs Enrich POSTs per-result
        and completion events to a customer-supplied webhookUrl. Server-to-endpoint
        HTTP, not WebSocket.
    - protocol: HTTP Polling
      scheme: https
      documented: true
      note: >-
        Asynchronous jobs are consumed by submitting a job, polling a progress
        endpoint, and fetching results. Client-initiated polling, not server push.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in Enrich's API reference as of the review date.
  endpointsConfirmedRest:
    - POST https://dev.enrich.so/api/v3/reverse-lookup/lookup
    - POST https://dev.enrich.so/api/v3/email-finder
    - POST https://dev.enrich.so/api/v3/email-validation
    - GET  https://dev.enrich.so/api/v3/reverse-lookup/phones
    - POST https://dev.enrich.so/api/v3/ip-to-company
    - POST https://dev.enrich.so/api/v3/company-follower
    - POST https://dev.enrich.so/api/v3/lead-finder/search
    - POST https://dev.enrich.so/api/v3/lead-finder/reveal
  endpointsModeled:
    - POST https://dev.enrich.so/api/v3/reverse-lookup/batch
    - GET  https://dev.enrich.so/api/v3/reverse-lookup/batch/{batchId}
    - POST https://dev.enrich.so/api/v3/email-finder/batch
    - POST https://dev.enrich.so/api/v3/email-validation/batch
    - POST https://dev.enrich.so/api/v3/reverse-lookup/phones/batch
    - GET  https://dev.enrich.so/api/v3/company-follower/{batchId}
    - POST https://dev.enrich.so/api/v3/lead-finder/count
    - GET  https://dev.enrich.so/api/v3/wallet/balance
    - GET  https://dev.enrich.so/api/v3/wallet/transactions
  endpointsModeledNote: |
    The single-call endpoints, their HTTP methods, and their credit costs are
    confirmed from the live Enrich documentation. Enrich clearly documents batch,
    progress, results, count, export, saved-search, team, and wallet endpoints in
    its navigation, but the exact URL path segments for those async sub-resources
    were not each individually opened; the paths above are modeled on Enrich's
    documented submit/poll/results pattern and should be reconciled against the
    current docs before code generation.
