description: >-
  FinOps view of Enrich spend. Enrich bills a prepaid, credit-metered model: you buy credits
  (via a monthly plan or top-up) and each API call debits credits by endpoint. Confirmed
  per-call costs are 1 credit for email validation, 10 for email finding, 10 for reverse
  email lookup (person enrichment), 100 for IP-to-company, 500 for phone finding, 50/525/575
  for lead reveal (email/phone/both), and 1 credit per returned result for lead search beyond
  the free page allowance. Unsuccessful ("not found") lookups and cached results are not
  charged, so effective cost tracks successful matches rather than raw call volume.
notes: >-
  Per-endpoint credit costs are confirmed from the live Enrich endpoint documentation. The
  dollar value of a credit depends on the monthly plan (larger plans lower the effective
  per-credit rate); confirm current plan pricing on www.enrich.so/pricing during
  reconciliation.
