meters:
- name: email_validation_credits
  description: 1 credit per email validation request; not charged when the result is risky.
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - endpoint
- name: email_finder_credits
  description: 10 credits per successful email find; not charged when found is false.
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - endpoint
- name: person_lookup_credits
  description: 10 credits per successful reverse email lookup (person enrichment); refunded when not found.
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - endpoint
- name: ip_to_company_credits
  description: 100 credits per IP-to-company resolution; refunded when no domain is found; cached 7 days.
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - endpoint
- name: phone_finder_credits
  description: 500 credits per successful phone lookup; refunded when no numbers are found.
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - endpoint
- name: lead_search_credits
  description: 1 credit per returned result beyond the free page allowance (first 3 pages / 75 results free).
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - endpoint
- name: lead_reveal_credits
  description: 50 credits email-only, 525 phone-only, 575 both per revealed lead; cached reveals free.
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - endpoint
- name: company_follower_credits
  description: Credits reserved upfront from max_limit and settled per profile found; excess refunded.
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - endpoint
principles:
- name: Visibility
  description: Track credit debits per endpoint via the wallet balance and transaction history; map spend to matches, not raw calls.
- name: Allocation
  description: Issue separate API keys per workload/team so credit consumption maps to internal cost centers.
- name: Optimization
  description: Validate and de-duplicate inputs before enriching; rely on not-found refunds and 7-day IP caching; prefer email reveal (50) over phone (525) when a phone is not required; keep lead searches within the free page allowance.
- name: Accountability
  description: Assign owners per key; review monthly credit burn against the plan allotment and top-up thresholds.
